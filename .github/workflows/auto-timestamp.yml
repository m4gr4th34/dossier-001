name: auto-timestamp
on:
  release:
    types: [published]
jobs:
  timestamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install OpenTimestamps client
        run: pip install opentimestamps-client
      - name: Download release archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event.release.tag_name }}
          curl -L -H "Authorization: token $GH_TOKEN" \
            "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz" \
            -o "${TAG}.tar.gz"
          echo "ARCHIVE=${TAG}.tar.gz" >> $GITHUB_ENV
      - name: Stamp with OpenTimestamps
        run: ots stamp "${{ env.ARCHIVE }}"
      - name: Update provenance.json for this release
        run: |
          # NOTE: Zenodo mints a distinct per-version DOI per release, but that
          # per-version DOI is the concept DOI suffixed per release; writing the
          # concept DOI value into version_doi here is acceptable because the
          # concept DOI always resolves to the latest version. Override with the
          # exact per-version DOI later if you want the bar to deep-link the
          # frozen archive rather than the latest.
          cat > provenance.json <<EOF
          {
            "release_tag": "${{ github.event.release.tag_name }}",
            "version_doi": "10.5281/zenodo.20670769",
            "concept_doi": "10.5281/zenodo.20670769",
            "released": "$(date -u +%Y-%m-%d)"
          }
          EOF
      - name: Commit proof and provenance to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p timestamps
          mv "${{ env.ARCHIVE }}.ots" timestamps/
          git add timestamps/ provenance.json
          git commit -m "Auto-timestamp: ${{ github.event.release.tag_name }} anchored via OpenTimestamps; update provenance.json"
          git push
